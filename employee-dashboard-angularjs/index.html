<!doctype html>
<html lang="en" ng-app="employeeApp">
  <head>
    <meta charset="UTF-8" />

    <title>Employee Management</title>

    <!-- Bootstrap -->

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles/style.css" />
  </head>

  <body>
    <!-- Routed Pages -->

    <app-navbar ng-if="isAuthenticated()"></app-navbar>

    <div class="container-fluid">
      <div class="row">
        <div class="col-md-2 p-0" ng-if="isAuthenticated()">
          <app-sidebar></app-sidebar>
        </div>

        <div
          ng-class="{
                'col-md-10': isAuthenticated(),
                'col-12': !isAuthenticated()
            }"
        >
          <div ng-view></div>
        </div>
      </div>
    </div>

    <app-footer ng-if="isAuthenticated()"></app-footer>

    <!-- AngularJS -->

    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>

    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular-route.min.js"></script>

    <!-- App -->

    <script src="app.js"></script>

    <script src="app.routes.js"></script>

    <!----Constansts-->
    <script src="constants/api.constants.js"></script>

    <!----Services-->
    <script src="services/auth.service.js"></script>
    <script src="services/employee.service.js"></script>

    <!----Interceptor-->
    <script src="interceptors/auth.interceptor.js"></script>

    <!----Directives-->
    <script src="directives/navbar.directive.js"></script>
    <script src="directives/sidebar.directive.js"></script>
    <script src="directives/footer.directive.js"></script>

    <!-- Controllers -->

    <script src="components/dashboard/dashboard.controller.js"></script>

    <script src="components/login/login.controller.js"></script>

    <script src="components/employees/employees.controller.js"></script>

    <script src="components/employee-details/employee-details.controller.js"></script>

    <script src="components/profile/profile.controller.js"></script>

    <script src="components/not-found/404.controller.js"></script>

    <script src="components/navbar/navbar.controller.js"></script>
  </body>
</html>
